# kind cluster configuration for local dev
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    extraPortMappings:
      # Map host 8080 -> container 30080 (HTTP)
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # Map host 8443 -> container 30443 (HTTPS)
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
      # Map host 30022 -> container 22 (SSH)
      - containerPort: 30022
        hostPort: 2222
        protocol: TCP

 # - role: worker
 # - role: worker

