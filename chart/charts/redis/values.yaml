image:
  repository: redis
  tag: "8.6.1-alpine"
  pullPolicy: IfNotPresent

auth:
  enabled: true
  secretName: redis-secret
  createSecret: true
  password: ""

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 6379

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowedPods:
    - "app.kubernetes.io/name": podsh-server
    - "app.kubernetes.io/name": syncdb

imagePullSecrets: []

