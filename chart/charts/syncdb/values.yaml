
image:
  repository: ghcr.io/kthcloud/podsh/syncdb
  #tag: "v1.0.0"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  enabled: false

externalMongo:
  enabled: true
  name: external-mongo
  ip: "" # fill me in
  port: 27017

mongo:
  name: podsh-mongo
  port: 27017
  secretName: mongo-secret

redis:
  name: podsh-redis
  port: 6379
  secretName: redis-secret

env: []

config:
  enabled: false
  mountPath: /etc/syncdb

resources:
  limits:
    cpu: 2000m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

liveness:
  path: /healthz
  port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readiness:
  path: /readyz
  port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

imagePullSecrets: []

