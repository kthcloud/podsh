apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-syncdb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: syncdb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syncdb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncdb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: syncdb-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            {{- range .Values.service.ports }}
            - containerPort: {{ .targetPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "Secret name for redis is required" .Values.redis.secretName }}
                  key: password
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ required "Secret name for mongo is required" .Values.mongo.secretName }}
                  key: user
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "Secret name for mongo is required" .Values.mongo.secretName }}
                  key: password

            {{- if .Values.externalMongo.enabled }}
            - name: MONGO_HOST
              value: "{{ required "Externalmongo requires a name for the svc" .Values.externalMongo.name }}:{{ .Values.externalMongo.port | default 27017 }}"
            {{- else  }}
            - name: MONGO_HOST
              value: "{{ required "If externalmongo isnt used a mongo hostname has to be provided" .Values.mongo.name }}:{{ .Values.mongo.port | default 27017 }}"
            {{- end}}
            - name: REDIS_ADDR
              value: "{{ required "Redis service name is required" .Values.redis.name }}:{{ .Values.redis.port | default 6379 }}"
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.liveness.path }}
              port: {{ .Values.liveness.port }}
            initialDelaySeconds: {{ .Values.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readiness.path }}
              port: {{ .Values.readiness.port }}
            initialDelaySeconds: {{ .Values.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.readiness.periodSeconds }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-syncdb-config
        {{- end }}

