{{- if .Values.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podsh-server-clusterrole
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/portforward
      - pods/ephemeralcontainers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
{{- end }}
