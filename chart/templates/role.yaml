{{- if .Values.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: podsh-server-role
  namespace: {{ .Values.rbac.namespace }}
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch

  - apiGroups: [""]
    resources:
      - pods/exec
      - pods/portforward
    verbs:
      - create

  - apiGroups: [""]
    resources:
      - pods/ephemeralcontainers
    verbs:
      - update
      - create
{{- end }}

