{{- if .Values.ssh.hostSignerKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-ssh
  labels:
    app.kubernetes.io/name: podsh-server
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  key: |
{{ required "ssh host signer key is required" .Values.ssh.hostSignerKey | indent 4 }}
{{- end }}
