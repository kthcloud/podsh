{{- if .Values.networkpolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-restrict
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: podsh-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 22
  # TODO: figure out what we need
  egress:
    - to:
        - namespaceSelector: {}
{{- end }}
