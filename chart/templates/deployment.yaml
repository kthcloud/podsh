apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-podsh-server
  labels:
    app.kubernetes.io/name: podsh-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: podsh-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: podsh-server
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: podsh-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - '--kubeconfig='
            - '--ssh-host-signer-path=/key'
            {{- if .Values.config.enabled }}
            - "--config={{ .Values.config.mountPath }}"
            {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          ports:
            {{- range .Values.service.ports }}
            - containerPort: {{ .targetPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: PODSH_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "Secret name for redis is required" .Values.redis.auth.secretName }}
                  key: password
            - name: PODSH_REDIS_ADDRESS
              value: podsh-redis:6379
            - name: PODSH_AGENT_IMAGE
              value: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
            - name: PODSH_AGENT_IMAGEPULLPOLICY
              value: {{ .Values.agent.image.pullPolicy }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            {{- end }}
            - name: ssh-hostkey
              mountPath: /key
              subPath: key
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.liveness.path }}
              port: {{ .Values.liveness.port }}
            initialDelaySeconds: {{ .Values.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readiness.path }}
              port: {{ .Values.readiness.port }}
            initialDelaySeconds: {{ .Values.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.readiness.periodSeconds }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        {{- end }}
        {{- if .Values.ssh.hostKeySecretName }}
        - name: ssh-hostkey
          secret:
            secretName: {{ .Values.ssh.hostKeySecretName }}
            defaultMode: 0600
            items:
              - key: key
                path: key
      {{- else if .Values.ssh.hostSignerKey }}
        - name: ssh-hostkey
          secret:
            secretName: {{ .Release.Name }}-ssh
            defaultMode: 0600
            items:
              - key: key
                path: key
      {{- end }}

