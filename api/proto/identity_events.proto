syntax = "proto3";
package identitypd;
option go_package = "github.com/kthcloud/podsh/api/proto;apiv1";

service IdentityEventService {
  // Client subscribes to identity projection events.
  // Server will:
  // 1. Send a full snapshot (SNAPSHOT events)
  // 2. Then stream LIVE updates
  rpc Subscribe(SubscribeRequest) returns (stream IdentityEvent);
}

message SubscribeRequest {
  // Optional logical subscriber ID (for logging / auditing)
  string subscriber_id = 1;

  // If true, forces a full snapshot rebuild.
  bool full_snapshot = 2;
}

message IdentityEvent {
  // Monotonic event ID generated by gateway.
  // Not Mongo resume token.
  uint64 event_id = 1;

  // Type of event.
  EventKind kind = 2;

  // Timestamp (server-side) in unix millis.
  int64 timestamp_ms = 3;

  // Payload (only set for UPSERT / SNAPSHOT).
  UserProjection user = 4;
}

enum EventKind {
  EVENT_KIND_UNSPECIFIED = 0;

  // Sent during initial full snapshot phase.
  SNAPSHOT = 1;

  // Sent for live upserts (insert/update).
  UPSERT = 2;

  // Sent when user is deleted or disabled.
  DELETE = 3;

  // Optional marker that snapshot phase is complete.
  SNAPSHOT_COMPLETE = 4;
}

message UserProjection {
  string user_id = 1;

  string display_name = 2;

  // Store full public keys or fingerprints.
  repeated string ssh_public_keys = 3;

  repeated string roles = 4;

  repeated string teams = 5;

  bool enabled = 6;

  // Optional optimistic version (increment on Mongo updates)
  uint64 version = 7;
}

